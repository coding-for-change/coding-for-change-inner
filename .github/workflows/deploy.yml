name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Build Docker images
      - name: Build Docker images
        run: |
          docker build \
            -t registry.infra.codingforchange.com/homepage-website:${{ github.sha }} \
            -t registry.infra.codingforchange.com/homepage-website:latest \
            ./outer
          
          docker build \
            -t registry.infra.codingforchange.com/homepage-inner:${{ github.sha }} \
            -t registry.infra.codingforchange.com/homepage-inner:latest \
            ./inner
            
          docker build \
            -t registry.infra.codingforchange.com/homepage-cms:${{ github.sha }} \
            -t registry.infra.codingforchange.com/homepage-cms:latest \
            ./inner/cms

      # 3. Push to private registry
      - name: Login to registry
        run: |
          docker login registry.infra.codingforchange.com \
            -u ${{ secrets.REGISTRY_USERNAME }} \
            -p ${{ secrets.REGISTRY_PASSWORD }}

      - name: Push Docker images
        run: |
          docker push registry.infra.codingforchange.com/homepage-website:${{ github.sha }}
          docker push registry.infra.codingforchange.com/homepage-website:latest
          
          docker push registry.infra.codingforchange.com/homepage-inner:${{ github.sha }}
          docker push registry.infra.codingforchange.com/homepage-inner:latest
          
          docker push registry.infra.codingforchange.com/homepage-cms:${{ github.sha }}
          docker push registry.infra.codingforchange.com/homepage-cms:latest

      # 4. Deploy to VPS via SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H codingforchange.com >> ~/.ssh/known_hosts

      - name: Copy files to VPS
        run: |
          SSH="ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"
          SCP="scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"
          SSH_TARGET="deploy-homepage@codingforchange.com"

          # Ensure target directory exists
          $SSH $SSH_TARGET "mkdir -p /var/www/homepage"

          # Copy docker-compose (prod → docker-compose.yml on VPS)
          $SCP docker-compose.prod.yml ${SSH_TARGET}:/var/www/homepage/docker-compose.yml

          # Copy Caddyfile
          $SCP Caddyfile ${SSH_TARGET}:/var/www/homepage/Caddyfile

          # Write .env from GitHub secrets and copy to VPS
          printf '%s\n' \
            "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            "PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}" \
            "CMS_URL=http://cms:3000" \
            "INNER_URL=http://inner:80" \
            > /tmp/.env
          $SCP /tmp/.env ${SSH_TARGET}:/var/www/homepage/.env
          rm -f /tmp/.env

      - name: Deploy on VPS
        run: |
          SSH="ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key deploy-homepage@codingforchange.com"

          $SSH "cd /var/www/homepage && \
            docker compose pull && \
            docker compose up -d"
