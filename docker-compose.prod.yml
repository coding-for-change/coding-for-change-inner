services:
  website:
    image: localhost:5000/homepage-website:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - CMS_URL=http://cms:3000
      - INNER_URL=http://inner:80
    depends_on:
      - inner
      - cms

  inner:
    image: localhost:5000/homepage-inner:latest
    restart: unless-stopped

  cms:
    image: localhost:5000/homepage-cms:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
