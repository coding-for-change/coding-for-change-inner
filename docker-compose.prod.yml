services:
  website:
    image: localhost:5000/homepage-website:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - CMS_URL=http://cms:3000
      - INNER_URL=http://inner:80
    depends_on:
      - inner
      - cms

  inner:
    image: localhost:5000/homepage-inner:latest
    restart: unless-stopped

  cms:
    image: localhost:5000/homepage-cms:latest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: payload
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
