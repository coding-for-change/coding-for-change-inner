services:
  # Outer 3D website (Three.js + Express) — single entry point
  website:
    build:
      context: ./outer
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:8080"
    env_file:
      - .env
    environment:
      - CMS_URL=http://cms:3000
      - INNER_URL=http://inner:80
    depends_on:
      - inner
      - cms

  # Inner site (React app, embedded as iframe)
  inner:
    build:
      context: ./inner
      dockerfile: Dockerfile
    restart: unless-stopped

  # Payload CMS (admin panel + REST API)
  cms:
    build:
      context: ./inner/cms
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql://payload:payload@mysql:3306/payload
    depends_on:
      mysql:
        condition: service_healthy

  # MySQL for Payload CMS
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: payload
      MYSQL_USER: payload
      MYSQL_PASSWORD: payload
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
